# =============================================================================
# Audrey — Personal Schedule & Habit Tracker Agent
# =============================================================================
# Docker Compose for the Audrey OpenClaw agent.
# Runs on ports 18791 (gateway) and 18792 (bridge).
#
# Usage:
#   docker compose --env-file ../../.env up -d audrey-gateway    # Start Audrey
#   docker compose --env-file ../../.env logs -f                 # Follow logs
#   docker compose --env-file ../../.env down                    # Stop Audrey
#   docker compose --env-file ../../.env run --rm audrey-cli onboard --no-install-daemon
#   docker compose --env-file ../../.env run --rm audrey-cli dashboard --no-open
# =============================================================================

services:
  audrey-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: audrey-gateway
    restart: unless-stopped
    init: true
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"

    ports:
      - "${AUDREY_GATEWAY_PORT:-18791}:18789"
      - "${AUDREY_BRIDGE_PORT:-18792}:18790"

    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_BOT_TOKEN: ${AUDREY_TELEGRAM_BOT_TOKEN}

    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ../../shared/skills:/home/node/.openclaw/shared-skills:ro
      - ./skills:/home/node/.openclaw/workspace/skills

    extra_hosts:
      - "host.docker.internal:host-gateway"

    labels:
      - "com.alphaeta.agent=audrey"
      - "com.alphaeta.role=schedule-habits"

  audrey-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: audrey-cli
    profiles:
      - cli
    entrypoint: ["node", "dist/index.js"]
    stdin_open: true
    tty: true
    init: true

    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TELEGRAM_BOT_TOKEN: ${AUDREY_TELEGRAM_BOT_TOKEN}

    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ../../shared/skills:/home/node/.openclaw/shared-skills:ro
      - ./skills:/home/node/.openclaw/workspace/skills

    extra_hosts:
      - "host.docker.internal:host-gateway"
