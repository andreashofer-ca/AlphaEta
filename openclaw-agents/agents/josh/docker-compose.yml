# =============================================================================
# Josh — AI & Tech Research Agent
# =============================================================================
# Docker Compose for the Josh OpenClaw agent.
# Runs on ports 18789 (gateway) and 18790 (bridge).
#
# Usage:
#   docker compose up -d          # Start Josh
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop Josh
#   docker compose run --rm josh-cli onboard   # First-time setup
#   docker compose run --rm josh-cli dashboard --no-open  # Get dashboard URL
# =============================================================================

services:
  josh-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: josh-gateway
    restart: unless-stopped
    command: node dist/index.js gateway

    ports:
      - "${JOSH_GATEWAY_PORT:-18789}:18789"
      - "${JOSH_BRIDGE_PORT:-18790}:18790"

    environment:
      # Gateway
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Cloud API Keys (for fallback)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${JOSH_TELEGRAM_BOT_TOKEN}

    volumes:
      # Agent-specific config (openclaw.json lives here)
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      # Agent workspace (persistent across restarts)
      - ./workspace:/home/node/.openclaw/workspace
      # Shared skills (mounted read-only from common pool)
      - ../../shared/skills:/home/node/.openclaw/shared-skills:ro
      # Agent-specific skills
      - ./skills:/home/node/.openclaw/workspace/skills

    # Allow reaching Ollama on host network (10.0.0.181)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    labels:
      - "com.alphaeta.agent=josh"
      - "com.alphaeta.role=research"

  josh-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: josh-cli
    profiles:
      - cli
    command: node dist/index.js

    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${JOSH_TELEGRAM_BOT_TOKEN}

    volumes:
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ./workspace:/home/node/.openclaw/workspace
      - ../../shared/skills:/home/node/.openclaw/shared-skills:ro
      - ./skills:/home/node/.openclaw/workspace/skills

    extra_hosts:
      - "host.docker.internal:host-gateway"
